<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Calendario Lavoro Sync</title>

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#4f46e5">
<link rel="manifest" href="manifest.json">
<link rel="icon" sizes="192x192" href="logo.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
/* Reset & Variabili per una gestione pulita dei colori */
:root {
    --bg-primary: #f8fafc;
    --card-bg: #ffffff;
    --text-main: #1e293b;
    --text-muted: #64748b;
    --accent: #4f46e5; /* Elegante viola/blu indigo */
    --accent-hover: #4338ca;
    --border-color: #e2e8f0;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
    --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.05), 0 4px 6px -4px rgba(0,0,0,0.05);
}

html { height: 100%; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg-primary);
    color: var(--text-main);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 12px; 
    margin: 0;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    min-height: 100dvh;
    box-sizing: border-box;
}

/* Contenitore che fa crescere il calendario fino a riempire lo spazio verticale disponibile */
.calendar-wrap {
    width: 100%;
    max-width: 850px;
    flex: 1 1 auto;
    display: flex;
    min-height: 0;
}

/* Status bar elegante */
#syncStatus { 
    font-size: 12px; 
    color: var(--text-muted); 
    margin-bottom: 12px; 
    font-weight: 600; 
    padding: 6px 16px; 
    border-radius: var(--radius-lg); 
    background: var(--card-bg); 
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border-color);
}

/* Controlli di Navigazione */
.controls {
    margin-bottom: 20px; 
    display: flex; 
    gap: 8px; 
    align-items: center; 
    flex-wrap: wrap; 
    justify-content: center;
    width: 100%;
    max-width: 850px;
}

select {
    padding: 10px 16px;
    font-size: 15px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-color);
    background-color: var(--card-bg);
    color: var(--text-main);
    font-weight: 500;
    outline: none;
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: all 0.2s ease;
}
select:focus {
    border-color: var(--accent);
}

/* Pulsanti */
button {
    font-family: inherit;
    padding: 10px 16px;
    border: none;
    border-radius: var(--radius-md);
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow-sm);
}
button:active {
    transform: scale(0.97);
}

.btn-ui { color: white; }
.btn-annual { background: var(--accent); }
.btn-annual:hover { background: var(--accent-hover); }
.btn-monthly { background: #7c3aed; } /* Viola moderno */
.btn-monthly:hover { background: #6d28d9; }

/* Calendario */
table {
    border-collapse: separate; 
    border-spacing: 6px; /* Rende i giorni dei box separati e moderni */
    width: 100%; 
    max-width: 850px; 
    background: transparent; 
    table-layout: fixed; 
    touch-action: pan-y;
    flex: 1 1 auto;
}

th {
    background: transparent;
    color: var(--text-muted); 
    height: 35px; 
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

td {
    border: 1px solid var(--border-color); 
    background: var(--card-bg);
    border-radius: var(--radius-md);
    min-height: 85px; 
    vertical-align: top; 
    padding: 8px; 
    cursor: pointer; 
    transition: all 0.2s ease; 
    overflow: hidden;
    position: relative;
    box-shadow: var(--shadow-sm);
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
}
td:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
}

/* Numeri del giorno all'interno delle celle */
td > div:first-child {
    font-weight: 700;
    font-size: 14px;
    color: var(--text-main);
}

.other-month {
    opacity: 0.4;
    background: #f1f5f9;
}

/* Etichetta della Società nel Calendario */
.company-label {
    font-size: 11px;
    font-weight: 700;
    color: #1e293b !important;
    margin-top: 6px; 
    line-height: 1.2;
    padding: 4px 6px;
    border-radius: 6px;
    background: rgba(255,255,255,0.85);
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    word-break: break-all;
}

.paid-day { 
    opacity: 0.6; 
}
.paid-day::after {
    content: "✓ Pagato";
    display: block;
    font-size: 9px;
    font-weight: bold;
    color: #16a34a;
    margin-top: 2px;
}

/* Animazioni e Feedback Gestures */
@keyframes slideFromRight { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes slideFromLeft { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
#calendarBody.swipe-left { animation: slideFromRight 0.25s cubic-bezier(0.16, 1, 0.3, 1); }
#calendarBody.swipe-right { animation: slideFromLeft 0.25s cubic-bezier(0.16, 1, 0.3, 1); }

td.td-pressing { background-color: rgba(79, 70, 229, 0.15) !important; }
td.flash-copied { outline: 3px solid #f59e0b; outline-offset: -3px; }
td.flash-pasted { outline: 3px solid #10b981; outline-offset: -3px; }
@keyframes cellShake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-4px);} 75%{transform:translateX(4px);} }
td.flash-empty { animation: cellShake 0.3s; }

/* Modali Eleganti */
.modal-overlay {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(15, 23, 42, 0.4); /* Overlay scuro e sfocato */
    backdrop-filter: blur(4px);
    justify-content:center;
    align-items:center;
    z-index: 1000;
}

.modal {
    background: var(--card-bg);
    padding: 24px;
    border-radius: var(--radius-lg);
    width: 90%;
    max-width: 420px;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--border-color);
}

.modal h3 {
    font-weight: 800;
    font-size: 20px;
    color: var(--text-main);
}

/* Form e Input */
.input-group { margin: 16px 0; }
.input-group label {
    font-weight: 600;
    display: block;
    margin-bottom: 6px; 
    font-size: 13px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.03em;
}
.input-group select, .input-group input {
    width: 100%; 
    padding: 10px 12px; 
    box-sizing: border-box; 
    border: 1px solid var(--border-color); 
    border-radius: var(--radius-md);
    background: var(--bg-primary);
    color: var(--text-main);
    font-size: 15px;
    outline: none;
    transition: all 0.2s ease;
}
.input-group select:focus, .input-group input:focus {
    border-color: var(--accent);
    background: var(--card-bg);
}

/* Bottoni di azione all'interno dei modali */
.modal-buttons { display: flex; justify-content: space-between; margin-top: 24px; gap: 8px; }
.btn-save { background: #10b981; color: white; }
.btn-save:hover { background: #059669; }
.btn-cancel { background: #64748b; color: white; }
.btn-cancel:hover { background: #475569; }
.btn-delete { background: #ef4444; color: white; }
.btn-delete:hover { background: #dc2626; }
.btn-copy { background: #f59e0b; color: white; }
.btn-paste { background: #3b82f6; color: white; }

/* Statistiche all'interno dei dettagli giorno */
.stats-container {
    margin-top: 20px; 
    padding: 16px; 
    background: #eff6ff; 
    border-radius: var(--radius-md); 
    font-size: 14px; 
    border-left: 4px solid var(--accent);
}
.stat-row { 
    display: flex; 
    justify-content: space-between; 
    margin-bottom: 6px; 
    font-weight: 500;
}
.stat-row span:last-child {
    font-weight: 700;
    color: var(--accent);
}

/* Consuntivi e Liste */
.summary-title { 
    border-bottom: 2px solid var(--border-color); 
    margin-bottom: 20px; 
    padding-bottom: 10px; 
}
.summary-item { 
    padding: 14px; 
    background: var(--bg-primary); 
    border-left: 4px solid var(--accent); 
    border-radius: var(--radius-md); 
    display: flex; 
    justify-content: space-between; 
    margin-bottom: 10px; 
    align-items: center;
    box-shadow: var(--shadow-sm);
}
.highlight-net { 
    border-left-color: #10b981; 
    background: #ecfdf5; 
    color: #065f46;
}
.highlight-net span:last-child {
    font-size: 18px;
    font-weight: 800;
}

.btn-excel { 
    background: #10b981; 
    color: white; 
    padding: 8px 12px; 
    border-radius: var(--radius-sm); 
    font-size: 12px; 
}

.invoice-box { 
    width: 100%; 
    display: flex; 
    align-items: center; 
    gap: 8px; 
    margin-top: 10px; 
    border-top: 1px dashed var(--border-color); 
    padding-top: 10px;
}

.btn-add { 
    background: var(--accent); 
    color: white; 
    width: 42px; 
    height: 42px;
    flex-shrink: 0; 
    border-radius: var(--radius-md); 
    font-size: 20px; 
    padding: 0;
}
.btn-add:hover { background: var(--accent-hover); }

.new-row { display: flex; gap: 8px; margin-top: 8px; }

/* ============================================================
   OTTIMIZZAZIONE MOBILE / TABLET
   ============================================================ */

html, body { max-width: 100%; overflow-x: hidden; }
body { overscroll-behavior-y: contain; }
button, select, .btn-add { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }

/* Rispetta il notch / safe area su iPhone */
@supports (padding: max(0px)) {
    body {
        padding-left: max(12px, env(safe-area-inset-left));
        padding-right: max(12px, env(safe-area-inset-right));
        padding-top: max(16px, env(safe-area-inset-top));
        padding-bottom: max(16px, env(safe-area-inset-bottom));
    }
}

/* Telefoni (ritratto e piccoli schermi) */
@media (max-width: 600px) {
    body { padding: 8px 5px; }
    #syncStatus { font-size: 11px; padding: 5px 12px; margin-bottom: 6px; }

    .controls { gap: 6px; margin-bottom: 8px; }
    select { padding: 7px 8px; font-size: 13px; }
    button { padding: 7px 8px; font-size: 12px; }

    table { border-spacing: 4px; }
    th { height: 22px; font-size: 11px; }
    td { min-height: 78px; padding: 5px; border-radius: var(--radius-sm); }
    td > div:first-child { font-size: 15px; }

    .company-label {
        font-size: 11px;
        margin-top: 4px;
        padding: 2px 4px;
        white-space: normal;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        word-break: break-word;
    }
    .paid-day::after { font-size: 8px; margin-top: 1px; }

    /* Modali: usano più spazio disponibile e input a 16px per non far zoomare Safari iOS */
    .modal { padding: 16px; width: 94%; max-height: 90vh; }
    .modal h3 { font-size: 17px; }
    .input-group { margin: 10px 0; }
    .input-group label { font-size: 11px; margin-bottom: 4px; }
    .input-group select, .input-group input { font-size: 16px; padding: 9px 10px; }
    .modal-buttons { flex-wrap: wrap; }
    .btn-add { width: 38px; height: 38px; font-size: 18px; }
}

/* Telefoni molto piccoli (es. iPhone SE) */
@media (max-width: 380px) {
    td { min-height: 64px; padding: 4px; }
    td > div:first-child { font-size: 13px; }
    .company-label { font-size: 9.5px; }
    th { font-size: 10px; }
}

/* Tablet: leggero adattamento, celle un po' più basse del desktop */
@media (min-width: 601px) and (max-width: 1024px) {
    td { height: 100px; }
    .company-label { font-size: 12px; }
}

/* Telefono in orizzontale: poco spazio verticale, celle più compatte */
@media (max-width: 900px) and (orientation: landscape) {
    body { padding: 6px 6px; }
    #syncStatus { margin-bottom: 4px; }
    .controls { margin-bottom: 6px; }
    td { min-height: 46px; padding: 3px; }
    td > div:first-child { font-size: 12px; }
    .company-label { font-size: 9px; margin-top: 1px; padding: 1px 3px; -webkit-line-clamp: 1; }
    .paid-day::after { display: none; }
    .modal { max-height: 92vh; padding: 14px; }
}
</style>
</head>
<body>

<div id="syncStatus">🔄 Inizializzazione...</div>

<div class="controls">
    <select id="monthSelect"></select>
    <select id="yearSelect"></select>
    <button class="btn-ui btn-annual" onclick="openSummary('annual')">📊 Annuale</button>
    <button class="btn-ui btn-monthly" onclick="openSummary('monthly')">📅 Mensile</button>
    <button class="btn-ui" style="background:#555" onclick="openSettings()">⚙️</button>
</div>

<div class="calendar-wrap">
<table id="calendarTable">
    <thead><tr><th>Lun</th><th>Mar</th><th>Mer</th><th>Gio</th><th>Ven</th><th>Sab</th><th>Dom</th></tr></thead>
    <tbody id="calendarBody"></tbody>
</table>
</div>

<div id="modalOverlay" class="modal-overlay">
    <div class="modal">
        <h3 id="modalDateText" style="margin:0 0 10px 0;"></h3>
        <button id="pasteBtn" class="btn-paste" onclick="pasteData()" style="display:none; width:100%; margin-bottom:10px;">📋 Incolla Dati</button>
        
        <div class="input-group">
            <label>Società</label>
            <div style="display:flex; gap:5px;">
                <select id="companySelect" style="flex:1"></select>
                <button type="button" class="btn-add" onclick="toggleNewRow('company')">+</button>
            </div>
            <div id="newCompanyRow" class="new-row" style="display:none;">
                <input type="text" id="newCompanyInput" placeholder="Nome nuova società..." onkeydown="if(event.key==='Enter'){event.preventDefault();confirmNewOption('company');}">
                <button type="button" class="btn-save" onclick="confirmNewOption('company')">OK</button>
                <button type="button" class="btn-cancel" onclick="cancelNewRow('company')">X</button>
            </div>
        </div>

        <div class="input-group">
            <label>Location</label>
            <div style="display:flex; gap:5px;">
                <select id="locationSelect" style="flex:1"></select>
                <button type="button" class="btn-add" onclick="toggleNewRow('location')">+</button>
            </div>
            <div id="newLocationRow" class="new-row" style="display:none;">
                <input type="text" id="newLocationInput" placeholder="Nome nuova location..." onkeydown="if(event.key==='Enter'){event.preventDefault();confirmNewOption('location');}">
                <button type="button" class="btn-save" onclick="confirmNewOption('location')">OK</button>
                <button type="button" class="btn-cancel" onclick="cancelNewRow('location')">X</button>
            </div>
        </div>

        <div class="input-group"><label>Inizio</label><select id="startTime" onchange="updateModalStats()"></select></div>
        <div class="input-group"><label>Fine</label><select id="endTime" onchange="updateModalStats()"></select></div>
        
        <div class="input-group">
            <label>Pausa pranzo</label>
            <select id="lunchBreak" onchange="updateModalStats()">
                <option value="si">Sì (Extra dopo 9h)</option>
                <option value="no">No (Extra dopo 8h)</option>
            </select>
        </div>

        <div class="input-group">
            <label>Tariffa base (€)</label>
            <div style="display:flex; gap:5px;">
                <input type="number" id="baseRate" step="0.01" min="0" value="250" style="flex:1; box-sizing:border-box;" oninput="updateModalStats()">
                <button type="button" class="btn-add" style="width:auto; padding:8px 10px; font-size:12px;" onclick="document.getElementById('baseRate').value=impostazioni.baseRate; updateModalStats();">Reset</button>
            </div>
        </div>

        <div class="input-group">
            <label>Tariffa straordinari (€/h)</label>
            <div style="display:flex; gap:5px;">
                <input type="number" id="extraRate" step="0.01" min="0" value="25" style="flex:1; box-sizing:border-box;" oninput="updateModalStats()">
                <button type="button" class="btn-add" style="width:auto; padding:8px 10px; font-size:12px;" onclick="document.getElementById('extraRate').value=impostazioni.extraRate; updateModalStats();">Reset</button>
            </div>
        </div>

        <div id="statsArea" class="stats-container" style="display:none;">
            <div class="stat-row"><span>Ore:</span><span id="displayHours">0</span></div>
            <div class="stat-row"><span>Paga:</span><span id="displayPay">0€</span></div>
        </div>

        <div class="modal-buttons">
            <button class="btn-cancel" onclick="closeModal()">Chiudi</button>
            <button class="btn-delete" onclick="clearDay()">Elimina Giorno</button>
        </div>
    </div>
</div>

<div id="summaryOverlay" class="modal-overlay">
    <div class="modal">
        <h3 id="summaryTitle" class="summary-title"></h3>
        <div id="summaryContent"></div>
        <div style="margin-top: 20px; text-align: right;">
            <button class="btn-cancel" onclick="closeSummary()">Chiudi</button>
        </div>
    </div>
</div>

<div id="settingsOverlay" class="modal-overlay">
    <div class="modal">
        <h3 style="margin:0 0 10px 0;">⚙️ Impostazioni</h3>
        <p style="font-size:12px; color:#666; margin-top:0;">Questi valori si applicano ai <strong>nuovi</strong> giorni che assegni. I giorni già salvati mantengono la tariffa con cui erano stati registrati.</p>
        
        <div class="input-group">
            <label>Tariffa base di default (€)</label>
            <input type="number" id="settingsBaseRate" step="0.01" min="0">
        </div>
        <div class="input-group">
            <label>Tariffa straordinari di default (€/h)</label>
            <input type="number" id="settingsExtraRate" step="0.01" min="0">
        </div>

        <!-- Nuove Sezioni Società e Location all'interno delle Impostazioni con possibilità di eliminazione -->
        <div class="input-group">
            <label>Società Registrate (Seleziona per eliminare)</label>
            <div style="display:flex; gap:5px;">
                <select id="settingsCompanySelect" style="flex:1"></select>
                <button type="button" class="btn-delete" style="padding: 0 12px;" onclick="deleteFromList('company')">Elimina</button>
            </div>
        </div>

        <div class="input-group">
            <label>Location Registrate (Seleziona per eliminare)</label>
            <div style="display:flex; gap:5px;">
                <select id="settingsLocationSelect" style="flex:1"></select>
                <button type="button" class="btn-delete" style="padding: 0 12px;" onclick="deleteFromList('location')">Elimina</button>
            </div>
        </div>

        <div class="modal-buttons">
            <button class="btn-cancel" onclick="closeSettings()">Annulla</button>
            <button class="btn-save" onclick="saveSettings()">Salva</button>
        </div>
    </div>
</div>

let societaExtra = [];
let locationExtra = [];
let impostazioni = { baseRate: 250, extraRate: 25 };

function listaSocieta(){ return [...new Set([...societaBase, ...societaExtra])].sort((a,b)=>a.localeCompare(b,'it')); }
function listaLocation(){ return [...new Set([...locationBase, ...locationExtra])].sort((a,b)=>a.localeCompare(b,'it')); }

function popolaSelect(sel, lista, valoreSelezionato){
    sel.innerHTML = '<option value="">-- Nessuna --</option>';
    lista.forEach(v => sel.add(new Option(v, v)));
    sel.value = valoreSelezionato && lista.includes(valoreSelezionato) ? valoreSelezionato : "";
}

function toggleNewRow(tipo){
    const row = document.getElementById(tipo === 'company' ? 'newCompanyRow' : 'newLocationRow');
    const input = document.getElementById(tipo === 'company' ? 'newCompanyInput' : 'newLocationInput');
    const aperta = row.style.display === "flex";
    row.style.display = aperta ? "none" : "flex";
    input.value = "";
    if(!aperta) input.focus();
}

function cancelNewRow(tipo){
    const row = document.getElementById(tipo === 'company' ? 'newCompanyRow' : 'newLocationRow');
    document.getElementById(tipo === 'company' ? 'newCompanyInput' : 'newLocationInput').value = "";
    row.style.display = "none";
}

function confirmNewOption(tipo){
    const input = document.getElementById(tipo === 'company' ? 'newCompanyInput' : 'newLocationInput');
    const nomePulito = (input.value || "").trim();
    if(!nomePulito){ input.focus(); return; }
    const sel = document.getElementById(tipo === 'company' ? 'companySelect' : 'locationSelect');
    if(tipo === 'company'){
        if(!listaSocieta().some(v => v.toLowerCase() === nomePulito.toLowerCase())) societaExtra.push(nomePulito);
        popolaSelect(sel, listaSocieta(), nomePulito);
    } else {
        if(!listaLocation().some(v => v.toLowerCase() === nomePulito.toLowerCase())) locationExtra.push(nomePulito);
        popolaSelect(sel, listaLocation(), nomePulito);
    }
    cancelNewRow(tipo);
    saveToCloud();
}

function generaOrari(sel){
    sel.innerHTML = '<option value="">--</option>';
    for(let h=0;h<24;h++) for(let m=0;m<60;m+=30) {
        const t = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
        sel.add(new Option(t,t));
    }
}
generaOrari(document.getElementById('startTime')); generaOrari(document.getElementById('endTime'));

async function loadFromCloud() {
    document.getElementById('syncStatus').innerText = "🔄 Caricamento dati...";
    try {
        const response = await fetch(SCRIPT_URL + "?t=" + new Date().getTime());
        const data = await response.json();
        assegnazioni = data.assegnazioni || {};
        fatture = data.fatture || {};
        pagamenti = data.pagamenti || {};
        societaExtra = data.societaExtra || [];
        locationExtra = data.locationExtra || [];
        // Se nel cloud ci fossero liste base modificate, usiamole, altrimenti teniamo quelle di default nel codice
        if(data.societaBase) societaBase = data.societaBase;
        if(data.locationBase) locationBase = data.locationBase;
        
        impostazioni = data.impostazioni || { baseRate: 250, extraRate: 25 };
        localStorage.setItem("calendarioLavoro", JSON.stringify(assegnazioni));
        localStorage.setItem("listeExtra", JSON.stringify({societaExtra, locationExtra, societaBase, locationBase}));
        localStorage.setItem("impostazioni", JSON.stringify(impostazioni));
        generaCalendario();
        document.getElementById('syncStatus').innerText = "✅ Sincronizzato";
    } catch (e) {
        console.error("Errore caricamento:", e);
        document.getElementById('syncStatus').innerText = "⚠️ Offline (Dati Locali)";
        assegnazioni = JSON.parse(localStorage.getItem("calendarioLavoro")) || {};
        const extra = JSON.parse(localStorage.getItem("listeExtra")) || {};
        societaExtra = extra.societaExtra || [];
        locationExtra = extra.locationExtra || [];
        if(extra.societaBase) societaBase = extra.societaBase;
        if(extra.locationBase) locationBase = extra.locationBase;
        
        impostazioni = JSON.parse(localStorage.getItem("impostazioni")) || { baseRate: 250, extraRate: 25 };
        generaCalendario();
    }
}

async function saveToCloud() {
    document.getElementById('syncStatus').innerText = "⏳ Salvataggio...";
    const data = { assegnazioni, fatture, pagamenti, societaExtra, locationExtra, societaBase, locationBase, impostazioni };
    localStorage.setItem("calendarioLavoro", JSON.stringify(assegnazioni));
    localStorage.setItem("listeExtra", JSON.stringify({societaExtra, locationExtra, societaBase, locationBase}));
    localStorage.setItem("impostazioni", JSON.stringify(impostazioni));
    try {
        await fetch(SCRIPT_URL, { 
            method: 'POST', 
            mode: 'no-cors', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data) 
        });
        document.getElementById('syncStatus').innerText = "✅ Inviato al Cloud";
    } catch (e) {
        console.error("Errore salvataggio:", e);
        document.getElementById('syncStatus').innerText = "❌ Errore sincronizzazione";
    }
}

function formatKey(date){ return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`; }

const LONG_PRESS_MS = 500, MOVE_THRESHOLD = 10;

function attachCellEvents(td, cellDate, key){
    let timer = null, moved = false, longPressFired = false, startX = 0, startY = 0;

    const iniziaPressione = (x, y) => {
        moved = false; longPressFired = false; startX = x; startY = y;
        td.classList.add('td-pressing');
        timer = setTimeout(() => {
            longPressFired = true;
            td.classList.remove('td-pressing');
            gestisciPressioneLunga(key, cellDate);
        }, LONG_PRESS_MS);
    };
    const muovi = (x, y) => {
        if(Math.abs(x - startX) > MOVE_THRESHOLD || Math.abs(y - startY) > MOVE_THRESHOLD){
            moved = true; clearTimeout(timer); td.classList.remove('td-pressing');
        }
    };
    const fine = () => {
        clearTimeout(timer); td.classList.remove('td-pressing');
        if(moved || longPressFired) return;
        gestisciTapGiorno(cellDate, key);
    };

    td.addEventListener('contextmenu', e => e.preventDefault());

    td.addEventListener('touchstart', e => iniziaPressione(e.touches[0].clientX, e.touches[0].clientY), {passive:true});
    td.addEventListener('touchmove', e => muovi(e.touches[0].clientX, e.touches[0].clientY), {passive:true});
    td.addEventListener('touchend', e => { e.preventDefault(); fine(); }, {passive:false});

    td.addEventListener('mousedown', e => iniziaPressione(e.clientX, e.clientY));
    td.addEventListener('mousemove', e => { if(timer) muovi(e.clientX, e.clientY); });
    td.addEventListener('mouseup', fine);
    td.addEventListener('mouseleave', () => { clearTimeout(timer); td.classList.remove('td-pressing'); });
}

let _tapTimer=null,_lastTapKey=null;
function gestisciTapGiorno(cellDate,key){
 if(_tapTimer && _lastTapKey===key){
   clearTimeout(_tapTimer);
   _tapTimer=null;
   _lastTapKey=null;
   delete assegnazioni[key];
   generaCalendario();
   saveToCloud();
   return;
 }
 _lastTapKey=key;
 _tapTimer=setTimeout(()=>{
   _tapTimer=null;
   _lastTapKey=null;
   openModal(cellDate);
 },250);
}

function gestisciPressioneLunga(key, cellDate){
    if(assegnazioni[key]){
        clipboard = { ...assegnazioni[key] };
        if(navigator.vibrate) navigator.vibrate(40);
        flashCella(key, 'flash-copied');
        document.getElementById('syncStatus').innerText = "📋 Giorno copiato";
    } else if(clipboard){
        assegnazioni[key] = { ...clipboard };
        generaCalendario();
        flashCella(key, 'flash-pasted');
        if(navigator.vibrate) navigator.vibrate(40);
        document.getElementById('syncStatus').innerText = "✅ Giorno incollato";
        saveToCloud();
    } else {
        flashCella(key, 'flash-empty');
    }
}

function flashCella(key, classe){
    const td = document.querySelector(`#calendarBody td[data-key="${key}"]`);
    if(!td) return;
    td.classList.add(classe);
    setTimeout(() => td.classList.remove(classe), 400);
}

function calcolaDettagliGiorno(ass) {
    if(!ass.start || !ass.end) return { ore:0, extra:0, paga:0 };
    const [h1, m1] = ass.start.split(':').map(Number), [h2, m2] = ass.end.split(':').map(Number);
    let inizio = h1 + (m1 / 60), fine = h2 + (m2 / 60);
    if (fine <= inizio) fine += 24;
    const oreTotali = fine - inizio, soglia = (ass.lunch === 'si') ? 9 : 8;
    const oreExtra = oreTotali > soglia ? oreTotali - soglia : 0;
    const tariffa = (ass.tariffa !== undefined && ass.tariffa !== null && ass.tariffa !== "") ? parseFloat(ass.tariffa) : impostazioni.baseRate;
    const tariffaExtra = (ass.extraRate !== undefined && ass.extraRate !== null && ass.extraRate !== "") ? parseFloat(ass.extraRate) : impostazioni.extraRate;
    return { ore: oreTotali, extra: oreExtra, paga: tariffa + (oreExtra * tariffaExtra) };
}

function generaCalendario(animazione){
    const body = document.getElementById('calendarBody'); body.innerHTML="";
    body.classList.remove('swipe-left','swipe-right');
    if(typeof animazione === 'string') requestAnimationFrame(() => body.classList.add(animazione));
    const mese = +monthSelect.value, anno = +yearSelect.value;
    let d = new Date(anno,mese,1); d.setDate(d.getDate() - (d.getDay()+6)%7);
    for(let r=0;r<6;r++){
        const tr = document.createElement('tr');
        for(let c=0;c<7;c++){
            const cellDate = new Date(d), key = formatKey(cellDate), td = document.createElement('td');
            if(cellDate.getMonth() !== mese) td.classList.add("other-month");
            td.innerHTML = `<div>${cellDate.getDate()}</div>`;
            if(assegnazioni[key]){
                const a = assegnazioni[key]; 
                const isPagata = (pagamenti[`${cellDate.getFullYear()}_${cellDate.getMonth()}_${a.company}`] === "si");
                if(isPagata) td.classList.add("paid-day");
                td.style.backgroundColor = coloriSocieta[a.company] || "#d4edda";
                const tariffaDiversa = (a.tariffa !== undefined && a.tariffa !== null && a.tariffa !== "" && parseFloat(a.tariffa) !== impostazioni.baseRate) || (a.extraRate !== undefined && a.extraRate !== null && a.extraRate !== "" && parseFloat(a.extraRate) !== impostazioni.extraRate);
                td.innerHTML += `<div class="company-label">${a.company}${tariffaDiversa ? ' ✈️' : ''}</div>`;
            }
            td.dataset.key = key;
            attachCellEvents(td, cellDate, key);
            tr.appendChild(td); d.setDate(d.getDate()+1);
        }
        body.appendChild(tr);
    }
}

function openModal(date){
    selectedDateKey = formatKey(date);
    document.getElementById('modalDateText').textContent = date.toLocaleDateString("it-IT",{day:'numeric',month:'short'});
    const a = assegnazioni[selectedDateKey] || {};
    popolaSelect(document.getElementById('companySelect'), listaSocieta(), a.company || "");
    popolaSelect(document.getElementById('locationSelect'), listaLocation(), a.location || "");
    cancelNewRow('company'); cancelNewRow('location');
    document.getElementById('startTime').value = a.start || ""; 
    document.getElementById('endTime').value = a.end || "";
    document.getElementById('lunchBreak').value = a.lunch || "si";
    document.getElementById('baseRate').value = (a.tariffa !== undefined && a.tariffa !== null && a.tariffa !== "") ? a.tariffa : impostazioni.baseRate;
    document.getElementById('extraRate').value = (a.extraRate !== undefined && a.extraRate !== null && a.extraRate !== "") ? a.extraRate : impostazioni.extraRate;
    document.getElementById('pasteBtn').style.display = clipboard ? "block" : "none";
    updateModalStats(); document.getElementById('modalOverlay').style.display="flex";
}

function saveAssignment(){
    assegnazioni[selectedDateKey] = { company: document.getElementById('companySelect').value, location: document.getElementById('locationSelect').value, start: document.getElementById('startTime').value, end: document.getElementById('endTime').value, lunch: document.getElementById('lunchBreak').value, tariffa: document.getElementById('baseRate').value, extraRate: document.getElementById('extraRate').value };
    closeModal(); generaCalendario(); saveToCloud();
}

function clearDay(){ delete assegnazioni[selectedDateKey]; closeModal(); generaCalendario(); saveToCloud(); }

function openSummary(type) {
    const anno = yearSelect.value, meseIdx = monthSelect.value;
    const filtro = (type === 'annual') ? anno : `${anno}-${String(parseInt(meseIdx)+1).padStart(2,'0')}`;
    let giornate = 0, lordo = 0, perSocieta = {};
    
    for (const key in assegnazioni) {
        if (key.startsWith(filtro)) {
            giornate++; 
            const d = calcolaDettagliGiorno(assegnazioni[key]), s = assegnazioni[key].company;
            lordo += d.paga;
            if (!perSocieta[s]) perSocieta[s] = { count: 0, lordo: 0 };
            perSocieta[s].count++; perSocieta[s].lordo += d.paga;
        }
    }
    
    const netto = lordo * 0.74;
    const media = giornate > 0 ? (lordo / giornate).toFixed(2) : "0.00";
    
    document.getElementById('summaryTitle').textContent = type === 'annual' ? `Consuntivo ${anno}` : `Consuntivo ${mesi[meseIdx]}`;
    
    let html = `
        <button class="btn-excel" style="width:100%; margin-bottom:10px;" onclick="exportExcel('${filtro}')">📥 Esporta Tutto Excel</button>
        <div class="summary-item"><span>Giornate:</span> <span>${giornate}</span></div>
        <div class="summary-item"><span>Media/Giorno:</span> <span>${media}€</span></div>
        <div class="summary-item"><span>Lordo:</span> <span>${lordo.toFixed(2)}€</span></div>
        <div class="summary-item highlight-net"><span>Netto (stimato):</span> <span>${netto.toFixed(2)}€</span></div>
    `;
    
    Object.entries(perSocieta).sort((a,b) => b[1].lordo - a[1].lordo).forEach(([soc, dati]) => {
        const keyData = `${anno}_${meseIdx}_${soc}`;
        const nFattura = fatture[keyData] || "";
        const statoPagamento = pagamenti[keyData] || "no";
        
        html += `
        <div class="summary-item" style="flex-direction:column; align-items:flex-start;">
            <div style="display:flex; justify-content:space-between; width:100%; align-items:center;">
                <strong>${soc}</strong>
                <button class="btn-excel" onclick="exportExcel('${filtro}', '${soc}')">Excel</button>
            </div>
            <div style="font-size:11px; color:#666; margin: 4px 0;">Giorni: ${dati.count} | Tot: ${dati.lordo.toFixed(2)}€</div>
            ${type === 'monthly' ? `
            <div class="invoice-box">
                <input type="text" placeholder="Fattura n." value="${nFattura}" onchange="fatture['${keyData}']=this.value; saveToCloud();">
                <select onchange="pagamenti['${keyData}']=this.value; generaCalendario(); saveToCloud();">
                    <option value="no" ${statoPagamento === 'no' ? 'selected' : ''}>No</option>
                    <option value="si" ${statoPagamento === 'si' ? 'selected' : ''}>Sì</option>
                </select>
            </div>` : ''}
        </div>`;
    });
    
    document.getElementById('summaryContent').innerHTML = html;
    document.getElementById('summaryOverlay').style.display = "flex";
}

function exportExcel(filtro, companyFilter = null) {
    let rows = [];
    let totLordo = 0;
    for (const key in assegnazioni) {
        if (key.startsWith(filtro)) {
            const a = assegnazioni[key];
            if (companyFilter && a.company !== companyFilter) continue;
            const d = calcolaDettagliGiorno(a);
            totLordo += d.paga;
            rows.push({
                "Data": key,
                "Società": a.company,
                "Location": a.location,
                "Orario": `${a.start} - ${a.end}`,
                "Ore Totali": d.ore.toFixed(1),
                "Extra": d.extra.toFixed(1),
                "Lordo (€)": d.paga.toFixed(2)
            });
        }
    }
    
    if (rows.length === 0) return alert("Nessun dato trovato");
    rows.sort((a, b) => a.Data.localeCompare(b.Data));

    rows.push({}); 
    rows.push({
        "Data": "TOTALE LORDO",
        "Lordo (€)": totLordo.toFixed(2)
    });
    
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Lavoro");
    const filename = companyFilter ? `Lavoro_${companyFilter}_${filtro}.xlsx` : `Lavoro_Tutti_${filtro}.xlsx`;
    XLSX.writeFile(wb, filename);
}

    const d = calcolaDettagliGiorno({start:s, end:e, lunch:document.getElementById('lunchBreak').value, tariffa: document.getElementById('baseRate').value, extraRate: document.getElementById('extraRate').value});

    document.getElementById('displayPay').textContent = d.paga.toFixed(2) + "€";

/* Funzione per eliminare società o location e aggiornare automaticamente le giornate */
function deleteFromList(tipo) {
    if (tipo === 'company') {
        const val = document.getElementById('settingsCompanySelect').value;
        if (!val) return alert("Seleziona una società da eliminare");
        if (confirm(`Sei sicuro di voler eliminare definitivamente "${val}"? Verrà rimossa anche dai giorni salvati.`)) {
            // Rimuovi da societaBase e societaExtra
            societaBase = societaBase.filter(item => item !== val);
            societaExtra = societaExtra.filter(item => item !== val);
            
            // Aggiorna le assegnazioni dei singoli giorni in automatico
            for (const key in assegnazioni) {
                if (assegnazioni[key].company === val) {
                    assegnazioni[key].company = "";
                }
            }
            popolaSelect(document.getElementById('settingsCompanySelect'), listaSocieta(), "");
            generaCalendario();
            saveToCloud();
        }
    } else if (tipo === 'location') {
        const val = document.getElementById('settingsLocationSelect').value;
        if (!val) return alert("Seleziona una location da eliminare");
        if (confirm(`Sei sicuro di voler eliminare definitivamente "${val}"? Verrà rimossa anche dai giorni salvati.`)) {
            // Rimuovi da locationBase e locationExtra
            locationBase = locationBase.filter(item => item !== val);
            locationExtra = locationExtra.filter(item => item !== val);
            
            // Aggiorna le assegnazioni dei singoli giorni in automatico
            for (const key in assegnazioni) {
                if (assegnazioni[key].location === val) {
                    assegnazioni[key].location = "";
                }
            }
            popolaSelect(document.getElementById('settingsLocationSelect'), listaLocation(), "");
            generaCalendario();
            saveToCloud();
        }
    }
}

function closeSettings(){ document.getElementById('settingsOverlay').style.display = "none"; }
function saveSettings(){
    const base = parseFloat(document.getElementById('settingsBaseRate').value);
    const extra = parseFloat(document.getElementById('settingsExtraRate').value);
    impostazioni.baseRate = isNaN(base) ? impostazioni.baseRate : base;
    impostazioni.extraRate = isNaN(extra) ? impostazioni.extraRate : extra;
    saveToCloud();
    closeSettings();
}

function cambiaMese(delta){
    let mese = +monthSelect.value + delta, anno = +yearSelect.value;
    if(mese < 0){ mese = 11; anno--; }
    if(mese > 11){ mese = 0; anno++; }
    if(anno < 2024 || anno > 2030) return;
    monthSelect.value = mese; yearSelect.value = anno;
    generaCalendario(delta > 0 ? 'swipe-left' : 'swipe-right');
}

(function initSwipe(){
    const tabella = document.getElementById('calendarTable');
    let startX = 0, startY = 0, tracking = false;
    tabella.addEventListener('touchstart', e => {
        startX = e.changedTouches[0].screenX; startY = e.changedTouches[0].screenY; tracking = true;
    }, {passive:true});
    tabella.addEventListener('touchend', e => {
        if(!tracking) return; tracking = false;
        const dx = e.changedTouches[0].screenX - startX, dy = e.changedTouches[0].screenY - startY;
        if(Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy) * 1.5){
            cambiaMese(dx < 0 ? 1 : -1);
        }
    }, {passive:true});
})();
